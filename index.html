<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Surplus Food Intelligence System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="mobile-container">
        <!-- Views will be injected here -->
        <header id="main-header">
            <h1 id="app-title">Smart Surplus</h1>
            <button id="role-switcher" class="btn-ghost">Logout</button>
        </header>

        <main id="content-area">
            <!-- Dynamic Content -->
            <div id="loading">Initializing System...</div>
        </main>

        <nav id="bottom-nav" class="hidden">
            <!-- Navigation items based on role -->
        </nav>
    </div>

    <!-- Modals / Notifications -->
    <div id="notification-toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
